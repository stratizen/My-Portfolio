<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio — Intro</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0a;
      --accent:  #c8f04d;
      --text:    #e8e8e8;
      --muted:   #555;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── GRID LINES ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── GLOW BLOB ── */
    .blob {
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,240,77,0.07) 0%, transparent 65%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
      z-index: 0;
      animation: breathe 6s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -60%) scale(1); }
      50%       { transform: translate(-50%, -60%) scale(1.12); }
    }

    /* ── CORNER MARKS ── */
    .corner {
      position: fixed;
      width: 22px; height: 22px;
      z-index: 2;
    }
    .corner--tl { top: 28px; left: 28px; border-top: 1px solid var(--muted); border-left: 1px solid var(--muted); }
    .corner--tr { top: 28px; right: 28px; border-top: 1px solid var(--muted); border-right: 1px solid var(--muted); }
    .corner--bl { bottom: 28px; left: 28px; border-bottom: 1px solid var(--muted); border-left: 1px solid var(--muted); }
    .corner--br { bottom: 28px; right: 28px; border-bottom: 1px solid var(--muted); border-right: 1px solid var(--muted); }

    /* ── TOP BAR ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 40px;
      z-index: 2;
    }
    .topbar__year {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .topbar__tag {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── INTRO STAGE ── */
    #intro {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      text-align: center;
      padding: 40px;
    }

    .presents-label {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.8s ease 0.3s forwards;
    }

    .intro__name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.9s ease 0.5s forwards;
    }
    .intro__name span { color: var(--accent); }

    .intro__role {
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 56px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.8s ease 0.75s forwards;
    }

    /* ── START BUTTON ── */
    .start-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 44px;
      border: 1px solid rgba(200,240,77,0.35);
      border-radius: 60px;
      background: transparent;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.3s, color 0.3s;
      opacity: 0;
      animation: fadeUp 0.8s ease 1s forwards;
    }
    .start-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform 0.4s cubic-bezier(0.77,0,0.18,1);
      border-radius: inherit;
    }
    .start-btn:hover::before { transform: translateX(0); }
    .start-btn:hover { color: #0a0a0a; border-color: var(--accent); }
    .start-btn span { position: relative; z-index: 1; }
    .start-btn svg { position: relative; z-index: 1; transition: transform 0.3s; }
    .start-btn:hover svg { transform: translateX(4px); }

    /* ── BOTTOM HINT ── */
    .scroll-hint {
      position: fixed;
      bottom: 36px; left: 50%; transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 2;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.4s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── LOADER OVERLAY ── */
    #loader {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #loader.visible {
      opacity: 1;
      pointer-events: all;
    }

    .loader__line-wrap {
      width: min(480px, 80vw);
      margin-bottom: 28px;
    }
    .loader__track {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }
    .loader__fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.05s linear;
    }

    .loader__meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .loader__label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .loader__pct {
      font-family: 'Syne', sans-serif;
      font-size: clamp(4rem, 14vw, 10rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 16px;
    }
    .loader__pct span { color: var(--accent); font-size: 0.4em; vertical-align: super; }

    .loader__status {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <!-- Decorative -->
  <div class="blob"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <!-- Top bar -->
  <div class="topbar">
    <span class="topbar__year">© 2026</span>
    <span class="topbar__tag">Portfolio</span>
  </div>

  <!-- Intro stage -->
  <div id="intro">
    <p class="presents-label">Cedric Designs Presents</p>
    <h1 class="intro__name">Your<br/><span>Name.</span></h1>
    <p class="intro__role">Full-Stack Developer &amp; Creative Technologist</p>
    <button class="start-btn" onclick="startExperience()">
      <span>Start Experience</span>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Bottom hint -->
  <p class="scroll-hint">Press to begin</p>

  <!-- Loader overlay -->
  <div id="loader">
    <div class="loader__pct" id="pctDisplay">0<span>%</span></div>
    <div class="loader__line-wrap">
      <div class="loader__meta">
        <span class="loader__label">Loading experience</span>
        <span class="loader__label" id="pctSmall">0%</span>
      </div>
      <div class="loader__track">
        <div class="loader__fill" id="loaderFill"></div>
      </div>
    </div>
    <p class="loader__status" id="loaderStatus">Initialising…</p>
  </div>

  <script>
    const statuses = [
      'Initialising…',
      'Loading assets…',
      'Preparing animations…',
      'Almost there…',
      'Welcome.'
    ];

    function startExperience() {
      const loader   = document.getElementById('loader');
      const fill     = document.getElementById('loaderFill');
      const pctBig   = document.getElementById('pctDisplay');
      const pctSmall = document.getElementById('pctSmall');
      const status   = document.getElementById('loaderStatus');

      loader.classList.add('visible');

      let current = 0;
      const target = 100;
      const duration = 3200; // ms total
      const interval = 30;   // tick every 30ms
      const steps = duration / interval;
      const increment = target / steps;

      const timer = setInterval(() => {
        current = Math.min(current + increment + Math.random() * 0.8, 100);
        const rounded = Math.floor(current);

        fill.style.width = rounded + '%';
        pctBig.innerHTML = rounded + '<span>%</span>';
        pctSmall.textContent = rounded + '%';

        // update status text at key milestones
        if (rounded < 20)       status.textContent = statuses[0];
        else if (rounded < 45)  status.textContent = statuses[1];
        else if (rounded < 70)  status.textContent = statuses[2];
        else if (rounded < 92)  status.textContent = statuses[3];
        else                    status.textContent = statuses[4];

        if (current >= 100) {
          clearInterval(timer);
          fill.style.width = '100%';
          pctBig.innerHTML = '100<span>%</span>';
          pctSmall.textContent = '100%';
          status.textContent = 'Welcome.';

          // brief pause then navigate to home
          setTimeout(() => {
            loader.style.transition = 'opacity 0.7s ease';
            loader.style.opacity = '0';
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 700);
          }, 500);
        }
      }, interval);
    }
  </script>
</body>
</html>
