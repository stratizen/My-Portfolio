<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio — Intro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --accent: #c8f04d;
      --text: #e8e8e8;
      --muted: #555555;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    /* GRID BACKGROUND */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 70px 70px;
      z-index: 0;
      pointer-events: none;
    }

    /* GREEN GLOW */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,240,77,0.10) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      pointer-events: none;
      z-index: 0;
    }

    /* CORNER BRACKETS */
    .corner {
      position: fixed;
      width: 20px;
      height: 20px;
      z-index: 3;
    }
    .corner.tl { top: 24px; left: 24px; border-top: 1px solid #333; border-left: 1px solid #333; }
    .corner.tr { top: 24px; right: 24px; border-top: 1px solid #333; border-right: 1px solid #333; }
    .corner.bl { bottom: 24px; left: 24px; border-bottom: 1px solid #333; border-left: 1px solid #333; }
    .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid #333; border-right: 1px solid #333; }

    /* TOP BAR */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      z-index: 3;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ===== INTRO SCREEN ===== */
    #intro-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      z-index: 2;
    }

    .label-presents {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .big-name {
      font-size: clamp(3.5rem, 12vw, 9rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      color: var(--text);
    }
    .big-name .accent { color: var(--accent); }

    .role-text {
      font-size: clamp(0.7rem, 1.5vw, 0.95rem);
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 60px;
    }

    /* START BUTTON */
    .start-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 18px 48px;
      border-radius: 100px;
      border: 1px solid rgba(200, 240, 77, 0.4);
      background: transparent;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: color 0.35s ease, border-color 0.35s ease;
    }
    .start-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      border-radius: inherit;
      transform: translateX(-105%);
      transition: transform 0.4s cubic-bezier(0.77, 0, 0.18, 1);
    }
    .start-btn:hover::after { transform: translateX(0); }
    .start-btn:hover { color: #0a0a0a; border-color: var(--accent); }
    .btn-text { position: relative; z-index: 1; }
    .btn-arrow {
      position: relative;
      z-index: 1;
      width: 18px;
      height: 18px;
      transition: transform 0.3s ease;
    }
    .start-btn:hover .btn-arrow { transform: translateX(5px); }

    /* BOTTOM HINT */
    .hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 3;
      white-space: nowrap;
    }

    /* PULSE DOT */
    .pulse-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }

    /* ===== LOADER SCREEN ===== */
    #loader-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #loader-screen.show {
      display: flex;
    }

    .loader-number {
      font-size: clamp(5rem, 20vw, 13rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
      margin-bottom: 40px;
    }
    .loader-number .pct-sign {
      font-size: 0.35em;
      color: var(--accent);
      vertical-align: super;
      margin-left: 4px;
    }

    .loader-bar-wrap {
      width: min(500px, 78vw);
    }
    .loader-bar-top {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .loader-track {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.07);
      position: relative;
    }
    .loader-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.04s linear;
    }
    .loader-status {
      margin-top: 20px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    /* FADE OUT */
    @keyframes fadeOut {
      to { opacity: 0; }
    }
    .fade-out {
      animation: fadeOut 0.7s ease forwards;
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="glow"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="topbar">
    <span>© 2026</span>
    <span>Portfolio</span>
  </div>

  <!-- INTRO SCREEN -->
  <div id="intro-screen">
    <p class="label-presents">
      <span class="pulse-dot"></span>
      WELCOME TO
    </p>
    <h1 class="big-name">
      CEDRIC<br/>
      <span class="accent">DESIGNS.</span>
    </h1>
    <p class="role-text">UI/UX Designer &amp; Creative Technologist</p>
    <button class="start-btn" onclick="startExperience()">
      <span class="btn-text">Start Experience</span>
      <svg class="btn-arrow" viewBox="0 0 18 18" fill="none">
        <path d="M3.5 9H14.5M10.5 5L14.5 9L10.5 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <p class="hint">Click to begin your journey</p>

  <!-- LOADER SCREEN -->
  <div id="loader-screen">
    <div class="loader-number" id="loader-number">0<span class="pct-sign">%</span></div>
    <div class="loader-bar-wrap">
      <div class="loader-bar-top">
        <span>Loading experience</span>
        <span id="loader-pct-small">0%</span>
      </div>
      <div class="loader-track">
        <div class="loader-fill" id="loader-fill"></div>
      </div>
    </div>
    <p class="loader-status" id="loader-status">Initialising…</p>
    
  </div>
  <!-- Add ?skipIntro=true to the end of the link -->
 

  <script>

    // If user has already seen the intro this session, skip straight to homepage
    if (sessionStorage.getItem('introSeen')) {
      window.location.replace('homepage.html');
    }
    
    var statusMessages = [
      'Initialising…',
      'Loading assets…',
      'Preparing animations…',
      'Almost ready…',
      'Welcome.'
    ];

    function startExperience() {
      document.getElementById('intro-screen').style.display = 'none';
      document.querySelector('.hint').style.display = 'none';
      document.getElementById('loader-screen').classList.add('show');

      var progress = 0;
      var loaderFill   = document.getElementById('loader-fill');
      var loaderNumber = document.getElementById('loader-number');
      var loaderSmall  = document.getElementById('loader-pct-small');
      var loaderStatus = document.getElementById('loader-status');

      var timer = setInterval(function() {
        var speed = 0.55;
        if (progress < 15) speed = 0.35;
        else if (progress > 85) speed = 0.22;

        progress += speed + (Math.random() * 0.45);
        if (progress > 100) progress = 100;

        var rounded = Math.floor(progress);

        loaderFill.style.width = rounded + '%';
        loaderNumber.innerHTML = rounded + '<span class="pct-sign">%</span>';
        loaderSmall.textContent = rounded + '%';

        if (rounded < 20)      loaderStatus.textContent = statusMessages[0];
        else if (rounded < 45) loaderStatus.textContent = statusMessages[1];
        else if (rounded < 72) loaderStatus.textContent = statusMessages[2];
        else if (rounded < 93) loaderStatus.textContent = statusMessages[3];
        else                   loaderStatus.textContent = statusMessages[4];

        if (progress >= 100) {
          clearInterval(timer);
          loaderFill.style.width = '100%';
          loaderNumber.innerHTML = '100<span class="pct-sign">%</span>';
          loaderSmall.textContent = '100%';
          loaderStatus.textContent = 'Welcome.';

          setTimeout(function() {
            document.getElementById('loader-screen').classList.add('fade-out');
            setTimeout(function() {
              window.location.href = 'homepage.html';
            }, 700);
          }, 600);
        }
      }, 28);
    }
  </script>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <script src="script.js"></script>  ← your script.js comes AFTER gsap

</body>
</html>
