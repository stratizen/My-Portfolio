<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio — Intro</title>
  <!-- Link to external style sheet -->
  <link rel="stylesheet" href="style.css">
  <style>
    /* Inline styles handling the intro layout structure */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #c4c4c4; /* Changed to dark theme so your glows/accents pop */
      --accent: #00aa91;
      --text: #e8e8e8;
      --muted: #555555;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    /* GRID BACKGROUND */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 70px 70px;
      z-index: 0;
      pointer-events: none;
    }

    /* GREEN GLOW */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,170,145,0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      pointer-events: none;
      z-index: 0;
    }

    /* INTRO SCREEN */
    #intro-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      z-index: 2;
    }

    .label-presents {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .big-name {
      font-size: clamp(3.5rem, 12vw, 9rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      color: var(--text);
    }
    .big-name .accent { color: var(--accent); }

    .role-text {
      font-size: clamp(0.7rem, 1.5vw, 0.95rem);
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 60px;
    }

    /* START BUTTON */
    .start-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 18px 48px;
      border-radius: 100px;
      border: 1px solid rgba(0, 170, 145, 0.4);
      background: transparent;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: color 0.35s ease, border-color 0.35s ease;
    }
    .start-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      border-radius: inherit;
      transform: translateX(-105%);
      transition: transform 0.4s cubic-bezier(0.77, 0, 0.18, 1);
      z-index: 0;
    }
    .start-btn:hover::after { transform: translateX(0); }
    .start-btn:hover { color: #0a0a0a; border-color: var(--accent); }
    .btn-text, .btn-arrow { position: relative; z-index: 1; }

    .btn-arrow {

      width: 18px;
      height: 18px;
      transition: transform 0.3s ease;
    }
    .start-btn:hover .btn-arrow { transform: translateX(5px); }


    .hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 3;
      white-space: nowrap;
    }


    .pulse-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }


  </style>

</head>
<body>

  <div class="grid-bg"></div>
  <div class="glow"></div>



  <!-- INTRO SCREEN -->
  <div id="intro-screen">
    <p class="label-presents">
      <span class="pulse-dot"></span>
      WELCOME TO
    </p>
    <h1 class="big-name">
      CED<br/>
      <span class="accent">DESIGNS.</span>
    </h1>
    <p class="role-text">UI/UX Designer &amp; Creative Technologist</p>
    <button class="start-btn" onclick="startExperience()">
      <span class="btn-text">Start Experience</span>
      <svg class="btn-arrow" viewBox="0 0 18 18" fill="none">
        <path d="M3.5 9H14.5M10.5 5L14.5 9L10.5 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <p class="hint">Click to begin your journey</p>

  <!-- LOADER SCREEN -->
  <div id="loader-screen">
    <!-- ROTATING SQUARE GRAPHIC -->
    <div class="loader-animation">
      <div class="square"></div>
    </div>

    <div class="loader-number" id="loader-number">
      0<span class="pct-sign">%</span>
    </div>

    <div class="loader-bar-wrap">
      <div class="loader-bar-top">
        <span>Loading experience</span>
        <span id="loader-pct-small">0%</span>
      </div>
      <div class="loader-track">
        <div class="loader-fill" id="loader-fill"></div>
      </div>
    </div>

    <p class="loader-status" id="loader-status">Initialising…</p>

  </div>

  <!-- GSAP CORE ENGINE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script>
    // Skip intro if already seen during this browser session
    if (sessionStorage.getItem('introSeen')) {
      window.location.replace('homepage.html');
    }
    
    var statusMessages = [
      'Initialising…',
      'Loading assets…',
      'Preparing animations…',
      'Almost ready…',
      'Welcome.'
    ];

    function startExperience() {
      document.getElementById('loader-screen').classList.add('show');
      document.getElementById('intro-screen').style.display = 'none';
      document.querySelector('.hint').style.display = 'none';

      /* GSAP INITIAL ENTRY ANIMATIONS */
      gsap.from(".loader-animation", {
        scale: 0,
        opacity: 0,
        duration: 1.2,
        ease: "power4.out"
      });

      gsap.from(".loader-number", {
        y: 40,
        opacity: 0,
        duration: 1,
        delay: 0.2,
        ease: "power3.out"
      });

      gsap.from(".loader-bar-wrap", {
        y: 20,
        opacity: 0,
        duration: 1,
        delay: 0.4,
        ease: "power3.out"
      });

      var progress = 0;
      var loaderFill   = document.getElementById('loader-fill');
      var loaderNumber = document.getElementById('loader-number');
      var loaderSmall  = document.getElementById('loader-pct-small');
      var loaderStatus = document.getElementById('loader-status');

      var timer = setInterval(function() {
        var speed = 0.55;
        if (progress < 15) speed = 0.35;
        else if (progress > 85) speed = 0.22;

        progress += speed + (Math.random() * 0.45);
        if (progress > 100) progress = 100;

        var rounded = Math.floor(progress);

        // Update tracking bars and text arrays
        loaderFill.style.width = rounded + '%';
        loaderNumber.innerHTML = rounded + '<span class="pct-sign">%</span>';
        loaderSmall.textContent = rounded + '%';

        if (rounded < 20) loaderStatus.textContent = statusMessages[0];
        else if (rounded < 45) loaderStatus.textContent = statusMessages[1];
        else if (rounded < 72) loaderStatus.textContent = statusMessages[2];
        else if (rounded < 93) loaderStatus.textContent = statusMessages[3];
        else loaderStatus.textContent = statusMessages[4];

        if (progress >= 100) {
          clearInterval(timer);
          sessionStorage.setItem('introSeen', 'true');

          setTimeout(function() {
            document.getElementById('loader-screen').classList.add('fade-out');
            setTimeout(function() {
              window.location.href = 'homepage.html';
            }, 700);
          }, 600);
        }
      }, 28);
    }
  </script>

</body>
</html>
