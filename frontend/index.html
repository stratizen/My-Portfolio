<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio — Creative Intro</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --bg: #060909; /* Deep slate teal-black background */
      --accent: #00aa91; /* Signature Teal */
      --text: #e8e8e8;
      --muted: #556c68;
      --font-display: 'Syne', sans-serif;
      --font-sans: 'Plus Jakarta Sans', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      overflow: hidden;
    }

    /* GRID BACKGROUND */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 80px 80px;
      z-index: 1;
      pointer-events: none;
    }

    /* THEME AMBIENT GLOWS */
    .glow-overlay {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,170,145,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1;
      filter: blur(40px);
    }

    /* INTRO MODULE SCREEN */
    #intro-screen {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      z-index: 10;
    }

    .label-presents {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .big-name {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 12vw, 8rem);
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
      color: var(--text);
      text-transform: uppercase;
    }
    .big-name .accent { 
      color: var(--accent);
      text-shadow: 0 0 30px rgba(0, 170, 145, 0.35);
    }

    .role-text {
      font-size: clamp(0.7rem, 1.5vw, 0.95rem);
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 60px;
    }

    /* START EXPERIENCE ACTION TRIGGER */
    .start-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 20px 52px;
      border-radius: 100px;
      border: 1px solid rgba(0, 170, 145, 0.4);
      background: rgba(0, 170, 145, 0.02);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      backdrop-filter: blur(8px);
      transition: color 0.4s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.4s ease;
    }
    .start-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      border-radius: inherit;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 0;
    }
    .start-btn:hover::after { 
      transform: scaleX(1); 
    }
    .start-btn:hover { 
      color: #030505; 
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(0, 170, 145, 0.25);
    }
    .btn-text, .btn-arrow { 
      position: relative; 
      z-index: 2; 
    }

    .btn-arrow {
      width: 18px;
      height: 18px;
      transition: transform 0.3s ease;
    }
    .start-btn:hover .btn-arrow { 
      transform: translateX(4px); 
    }

    .hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 10;
      white-space: nowrap;
    }

    .pulse-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 10px var(--accent);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.65); }
    }

    /* CREATIVE PORTFOLIO LOADER OVERLAY */
    #loader-screen {
      position: fixed;
      inset: 0;
      background: #030505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }
    #loader-screen.show {
      opacity: 1;
      pointer-events: auto;
    }

    #particles-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* REVOLVING HALO ENGINE & LOGO */
    .halo-wrapper {
      position: relative;
      width: 340px;
      height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 48px;
    }

    .halo-svg {
      position: absolute;
      width: 100%;
      height: 100%;
      animation: spin-clockwise 24s linear infinite;
    }

    @keyframes spin-clockwise {
      100% { transform: rotate(360deg); }
    }

    .emblem-core {
      position: relative;
      width: 100px;
      height: 100px;
      background: rgba(0, 170, 145, 0.04);
      border: 1px solid rgba(0, 170, 145, 0.35);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 38px;
      font-weight: 900;
      color: #fff;
      z-index: 2;
      box-shadow: 
        0 0 30px rgba(0, 170, 145, 0.1),
        inset 0 0 15px rgba(0, 170, 145, 0.15);
      animation: core-pulse 3s ease-in-out infinite alternate;
    }

    @keyframes core-pulse {
      0% {
        transform: scale(0.96);
        box-shadow: 0 0 25px rgba(0, 170, 145, 0.08);
      }
      100% {
        transform: scale(1.04);
        box-shadow: 0 0 45px rgba(0, 170, 145, 0.25);
        border-color: rgba(0, 170, 145, 0.65);
      }
    }

    /* DIGITAL PERCENTAGE COUNTER */
    .loader-number {
      font-family: var(--font-display);
      font-size: 54px;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: #fff;
      display: flex;
      align-items: baseline;
      justify-content: center;
      margin-bottom: 24px;
    }

    .loader-number span {
      font-size: 24px;
      color: var(--accent);
      margin-left: 2px;
    }

    /* PROGRESS TRACK SYSTEMS */
    .loader-bar-wrap {
      width: 260px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .loader-bar-top {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .loader-track {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
    }

    .loader-fill {
      width: 0%;
      height: 100%;
      background: var(--accent);
      border-radius: inherit;
      box-shadow: 0 0 12px var(--accent);
      transition: width 0.1s ease-out;
    }

    .loader-status {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 16px;
      font-weight: 600;
    }

    /* REDIRECT FLASH FADE */
    .fade-out {
      opacity: 0 !important;
      transition: opacity 0.8s cubic-bezier(0.77, 0, 0.18, 1) !important;
    }
  </style>
</head>
<body>

  <!-- BACKGROUND ARCHITECTURE -->
  <div class="grid-bg"></div>
  <div class="glow-overlay"></div>

  <!-- INTRO SCREEN -->
  <div id="intro-screen">
    <p class="label-presents">
      <span class="pulse-dot"></span>
      Welcome To
    </p>
    <h1 class="big-name">
      Ced<br/>
      <span class="accent">Designs.</span>
    </h1>
    <p class="role-text">Creative Director &amp; Motion Technologist</p>
    
    <button class="start-btn" onclick="startExperience()">
      <span class="btn-text">Start Experience</span>
      <svg class="btn-arrow" viewBox="0 0 18 18" fill="none">
        <path d="M3.5 9H14.5M10.5 5L14.5 9L10.5 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <p class="hint">Click to begin your journey</p>

  <!-- LOADER SCREEN (Creative Design Concept inspired by second visual mock) -->
  <div id="loader-screen">
    <canvas id="particles-canvas"></canvas>

    <!-- Revolving Circle Typography Halo & Core Emblem -->
    <div class="halo-wrapper">
      <svg class="halo-svg" viewBox="0 0 300 300">
        <path id="haloTextPath" d="M 150, 150 m -120, 0 a 120,120 0 1,1 240,0 a 120,120 0 1,1 -240,0" fill="none" />
        <text fill="rgba(0, 170, 145, 0.85)" font-family="Syne" font-size="9" font-weight="700" letter-spacing="4px">
          <textPath href="#haloTextPath">
            • INTERACTION DESIGN • CODE SYNERGY • BRAND METADATA • FUTURE UNFOLDING • MOTION GRAPHICS 
          </textPath>
        </text>
      </svg>
      <div class="emblem-core">C</div>
    </div>

    <!-- Numerical Progress Counter -->
    <div class="loader-number" id="loader-number">
      0<span>%</span>
    </div>

    <!-- Graphical Progress Rails -->
    <div class="loader-bar-wrap">
      <div class="loader-bar-top">
        <span>Loading Experience</span>
        <span id="loader-pct-small">0%</span>
      </div>
      <div class="loader-track">
        <div class="loader-fill" id="loader-fill"></div>
      </div>
    </div>

    <!-- Asset Status Feedback -->
    <p class="loader-status" id="loader-status">Initialising System…</p>
  </div>

  <!-- GSAP CORE FRAMEWORK -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script>
    // Skip intro if already seen during this browser session
    if (sessionStorage.getItem('introSeen')) {
      window.location.replace('homepage.html');
    }

    var statusMessages = [
      'Initialising core modules…',
      'Configuring workspace grids…',
      'Loading creative environments…',
      'Synchronising motion timelines…',
      'System ready.'
    ];

    /* ==========================================================
       1. HARDWARE-ACCELERATED DRIFTING WEB PARTICLES
       ========================================================== */
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    
    let particlesArray = [];
    const maxParticles = 65;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2.5 + 1;
        this.speedX = (Math.random() - 0.5) * 0.45;
        this.speedY = (Math.random() - 0.5) * 0.45;
        this.opacity = Math.random() * 0.5 + 0.2;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 170, 145, ${this.opacity})`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#00aa91';
        ctx.fill();
        ctx.shadowBlur = 0; // Reset
      }
    }

    function initParticles() {
      particlesArray = [];
      for (let i = 0; i < maxParticles; i++) {
        particlesArray.push(new Particle());
      }
    }

    function connectParticles() {
      const maxDistance = 140;
      for (let a = 0; a < particlesArray.length; a++) {
        for (let b = a + 1; b < particlesArray.length; b++) {
          let dx = particlesArray[a].x - particlesArray[b].x;
          let dy = particlesArray[a].y - particlesArray[b].y;
          let distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < maxDistance) {
            let opacity = (1 - (distance / maxDistance)) * 0.15;
            ctx.strokeStyle = `rgba(0, 170, 145, ${opacity})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
            ctx.stroke();
          }
        }
      }
    }

    let animationFrameId;
    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
      }
      
      connectParticles();
      animationFrameId = requestAnimationFrame(animateParticles);
    }

    /* ==========================================================
       2. TRIGGER TRANSITION & LOADER CYCLES
       ========================================================== */
    function startExperience() {
      document.getElementById('loader-screen').classList.add('show');
      document.getElementById('intro-screen').style.display = 'none';
      document.querySelector('.hint').style.display = 'none';

      initParticles();
      animateParticles();

      // Halo entrance sequence
      gsap.from(".halo-wrapper", {
        scale: 0.65,
        opacity: 0,
        duration: 1.5,
        ease: "elastic.out(1, 0.75)"
      });

      gsap.from(".loader-number", {
        y: 30,
        opacity: 0,
        duration: 1.2,
        delay: 0.2,
        ease: "power4.out"
      });

      gsap.from(".loader-bar-wrap", {
        y: 20,
        opacity: 0,
        duration: 1,
        delay: 0.4,
        ease: "power3.out"
      });

      var progress = 0;
      var loaderFill   = document.getElementById('loader-fill');
      var loaderNumber = document.getElementById('loader-number');
      var loaderSmall  = document.getElementById('loader-pct-small');
      var loaderStatus = document.getElementById('loader-status');

      var timer = setInterval(function() {
        var speed = 0.5;
        if (progress < 15) speed = 0.8;
        else if (progress > 85) speed = 0.3;

        progress += speed + (Math.random() * 0.6);
        if (progress > 100) progress = 100;

        var rounded = Math.floor(progress);

        // Update indicators
        loaderFill.style.width = rounded + '%';
        loaderNumber.innerHTML = rounded + '<span>%</span>';
        loaderSmall.textContent = rounded + '%';

        if (rounded < 22) loaderStatus.textContent = statusMessages[0];
        else if (rounded < 48) loaderStatus.textContent = statusMessages[1];
        else if (rounded < 70) loaderStatus.textContent = statusMessages[2];
        else if (rounded < 92) loaderStatus.textContent = statusMessages[3];
        else loaderStatus.textContent = statusMessages[4];

        if (progress >= 100) {
          clearInterval(timer);
          sessionStorage.setItem('introSeen', 'true');

          setTimeout(function() {
            // Smooth exit animation
            cancelAnimationFrame(animationFrameId);
            document.getElementById('loader-screen').classList.add('fade-out');
            setTimeout(function() {
              window.location.href = 'homepage.html';
            }, 800);
          }, 600);
        }
      }, 24);
    }

    // Intro Entrance Reveal 
    const introTl = gsap.timeline();
    introTl.from(".label-presents", { opacity: 0, y: -20, duration: 0.8, ease: "power2.out" })
           .from(".big-name", { opacity: 0, y: 30, duration: 1.2, ease: "power4.out" }, "-=0.5")
           .from(".role-text", { opacity: 0, y: 15, duration: 1, ease: "power3.out" }, "-=0.8")
           .from(".start-btn", { opacity: 0, scale: 0.9, duration: 0.8, ease: "back.out(1.7)" }, "-=0.5");
  </script>

</body>
</html>
